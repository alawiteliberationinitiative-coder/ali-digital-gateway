name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/ali-gateway/android/**'
      - 'artifacts/ali-gateway/src/**'
      - 'artifacts/ali-gateway/capacitor.config.ts'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Release signing — PKCS12 keystore (base64-encoded, generated via openssl)
  KEYSTORE_B64: 
  KEYSTORE_PASS: ALIgateway2026
  KEY_ALIAS: ali-gateway
  KEY_PASS: ALIgateway2026

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js + pnpm ────────────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      # ── 3. Capacitor sync ─────────────────────────────────────────────────────
      - name: Create required Android assets directory
        run: mkdir -p artifacts/ali-gateway/android/app/src/main/assets

      - name: Capacitor sync (generates Android native files)
        working-directory: artifacts/ali-gateway
        run: pnpm exec cap sync android

      # ── 4. Java 21 ───────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # ── 5. Android SDK ───────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 6. Decode signing keystore ────────────────────────────────────────────
      - name: Decode release keystore
        run: echo "$KEYSTORE_B64" | base64 -d > /tmp/ali-release.keystore

      # ── 7. local.properties + Gradle permission ───────────────────────────────
      - name: Create local.properties
        working-directory: artifacts/ali-gateway/android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Grant Gradle execute permission
        working-directory: artifacts/ali-gateway/android
        run: chmod +x gradlew

      # ── 8. Build signed release APK ──────────────────────────────────────────
      - name: Build Signed Release APK
        working-directory: artifacts/ali-gateway/android
        env:
          KEYSTORE_PATH: /tmp/ali-release.keystore
          KEYSTORE_PASS: ${{ env.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASS: ${{ env.KEY_PASS }}
        run: ./gradlew assembleRelease --no-daemon

      # ── 9. Prepare APK for release ────────────────────────────────────────────
      - name: Locate and rename APK
        id: apk
        run: |
          SRC=$(find artifacts/ali-gateway/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          DATE=$(date +%Y%m%d)
          SHORT_SHA=${GITHUB_SHA::7}
          VERSIONED="ALI-Gateway-release-${DATE}-${SHORT_SHA}.apk"
          cp "$SRC" "$VERSIONED"
          cp "$SRC" "ALI-Gateway.apk"
          echo "versioned=$VERSIONED" >> $GITHUB_OUTPUT
          echo "size=$(du -sh $VERSIONED | cut -f1)" >> $GITHUB_OUTPUT
          ls -lh "$VERSIONED"

      # ── 10. Publish as GitHub Release ─────────────────────────────────────────
      - name: Delete old android-latest release (if exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete android-latest --yes 2>/dev/null || true
          git push --delete origin refs/tags/android-latest 2>/dev/null || true

      - name: Create GitHub Release with APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date "+%Y-%m-%d %H:%M UTC")
          gh release create android-latest \
            --title "ALI Gateway — آخر إصدار أندرويد (موقّع)" \
            --notes "**تاريخ البناء:** ${DATE}
          **النوع:** release (موقّع — يُثبَّت بدون تحذيرات Play Protect)
          **الإصدار:** ${{ steps.apk.outputs.versioned }}

          ### كيفية التثبيت
          1. حمّل ملف \`ALI-Gateway.apk\`
          2. افتح الملف على هاتفك
          3. عند ظهور رسالة \"السماح بالتثبيت من هذا المصدر\" → اضغط **موافق**
          4. اضغط **تثبيت**

          > التطبيق يحمّل المحتوى من الخادم مباشرةً — أي تحديث يصل فوراً بدون إعادة تثبيت" \
            --latest \
            "ALI-Gateway.apk" \
            "${{ steps.apk.outputs.versioned }}"

      # ── 11. ملخص البناء ───────────────────────────────────────────────────────
      - name: Job summary
        run: |
          echo "## ✅ APK موقّع نُشر بنجاح كـ GitHub Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**الحجم:** ${{ steps.apk.outputs.size }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### رابط التحميل المباشر" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "https://github.com/alawiteliberationinitiative-coder/ali-digital-gateway/releases/latest/download/ALI-Gateway.apk" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
