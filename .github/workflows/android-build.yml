name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/ali-gateway/android/**'
      - 'artifacts/ali-gateway/src/**'
      - 'artifacts/ali-gateway/capacitor.config.ts'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build APK (${{ github.event.inputs.build_type || 'debug' }})
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # ── 3. Android SDK (pre-installed on ubuntu-latest) ──────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Write local.properties with SDK path ───────────────────────────────
      - name: Create local.properties
        working-directory: artifacts/ali-gateway/android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # ── 5. Make gradlew executable ────────────────────────────────────────────
      - name: Grant Gradle execute permission
        working-directory: artifacts/ali-gateway/android
        run: chmod +x gradlew

      # ── 6. Build APK ─────────────────────────────────────────────────────────
      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: artifacts/ali-gateway/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK (unsigned)
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: artifacts/ali-gateway/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── 7. Locate APK ────────────────────────────────────────────────────────
      - name: Locate APK file
        id: apk_path
        working-directory: artifacts/ali-gateway/android
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          else
            APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          fi
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"
          ls -lh "$APK"

      # ── 8. Rename APK with version + date ────────────────────────────────────
      - name: Rename APK
        id: rename
        run: |
          DATE=$(date +%Y%m%d)
          SHORT_SHA=${GITHUB_SHA::7}
          TYPE=${{ github.event.inputs.build_type || 'debug' }}
          NAME="ALI-Gateway-${TYPE}-${DATE}-${SHORT_SHA}.apk"
          cp "artifacts/ali-gateway/android/${{ steps.apk_path.outputs.path }}" "$NAME"
          echo "name=$NAME" >> $GITHUB_OUTPUT

      # ── 9. Upload as GitHub artifact (download link valid 90 days) ────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.name }}
          path: ${{ steps.rename.outputs.name }}
          retention-days: 90

      # ── 10. Print download instructions in job summary ───────────────────────
      - name: Job summary
        run: |
          echo "## ✅ APK Built Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**File:** \`${{ steps.rename.outputs.name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### كيفية التحميل" >> $GITHUB_STEP_SUMMARY
          echo "1. اضغط على **Summary** في أعلى الصفحة" >> $GITHUB_STEP_SUMMARY
          echo "2. انزل لقسم **Artifacts**" >> $GITHUB_STEP_SUMMARY
          echo "3. اضغط على اسم الملف لتحميله مباشرة" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> التطبيق يتحمل المحتوى من الإنتاج — أي تحديث على Replit يصل للمستخدمين فوراً بدون إعادة بناء APK" >> $GITHUB_STEP_SUMMARY
