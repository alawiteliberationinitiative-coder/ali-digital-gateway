name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/ali-gateway/android/**'
      - 'artifacts/ali-gateway/src/**'
      - 'artifacts/ali-gateway/capacitor.config.ts'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK (${{ github.event.inputs.build_type || 'debug' }})
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js + pnpm ────────────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      # ── 3. Capacitor sync — generates cordova.variables.gradle + native files ─
      - name: Create required Android assets directory
        run: mkdir -p artifacts/ali-gateway/android/app/src/main/assets

      - name: Capacitor sync (generates Android native files)
        working-directory: artifacts/ali-gateway
        run: pnpm exec cap sync android

      # ── 4. Java 21 ───────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # ── 5. Android SDK ───────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 6. Write local.properties with SDK path ───────────────────────────────
      - name: Create local.properties
        working-directory: artifacts/ali-gateway/android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # ── 7. Make gradlew executable ────────────────────────────────────────────
      - name: Grant Gradle execute permission
        working-directory: artifacts/ali-gateway/android
        run: chmod +x gradlew

      # ── 8. Build APK ─────────────────────────────────────────────────────────
      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: artifacts/ali-gateway/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK (unsigned)
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: artifacts/ali-gateway/android
        run: ./gradlew assembleRelease --no-daemon

      # ── 9. Prepare APK for release ────────────────────────────────────────────
      - name: Locate and rename APK
        id: apk
        run: |
          TYPE=${{ github.event.inputs.build_type || 'debug' }}
          if [ "$TYPE" = "release" ]; then
            SRC=$(find artifacts/ali-gateway/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          else
            SRC=$(find artifacts/ali-gateway/android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          fi
          DATE=$(date +%Y%m%d)
          SHORT_SHA=${GITHUB_SHA::7}
          VERSIONED="ALI-Gateway-${TYPE}-${DATE}-${SHORT_SHA}.apk"
          cp "$SRC" "$VERSIONED"
          cp "$SRC" "ALI-Gateway.apk"
          echo "versioned=$VERSIONED" >> $GITHUB_OUTPUT
          echo "size=$(du -sh $VERSIONED | cut -f1)" >> $GITHUB_OUTPUT
          ls -lh "$VERSIONED"

      # ── 10. Publish as GitHub Release (رابط عام مجاني لأي مستخدم) ────────────
      - name: Delete old android-latest release (if exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete android-latest --yes 2>/dev/null || true
          git push --delete origin refs/tags/android-latest 2>/dev/null || true

      - name: Create GitHub Release with APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TYPE=${{ github.event.inputs.build_type || 'debug' }}
          DATE=$(date "+%Y-%m-%d %H:%M UTC")
          gh release create android-latest \
            --title "ALI Gateway — آخر إصدار أندرويد" \
            --notes "**تاريخ البناء:** ${DATE}
          **النوع:** ${TYPE}
          **الإصدار:** ${{ steps.apk.outputs.versioned }}

          ### كيفية التثبيت
          1. حمّل ملف \`ALI-Gateway.apk\`
          2. افتح الملف على هاتفك
          3. اسمح بتثبيت التطبيقات من مصادر غير معروفة إذا طُلب ذلك

          > التطبيق يحمّل المحتوى من الخادم مباشرةً — أي تحديث يصل فوراً بدون إعادة تثبيت" \
            --latest \
            "ALI-Gateway.apk" \
            "${{ steps.apk.outputs.versioned }}"

      # ── 11. ملخص البناء ───────────────────────────────────────────────────────
      - name: Job summary
        run: |
          echo "## ✅ APK نُشر بنجاح كـ GitHub Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**الحجم:** ${{ steps.apk.outputs.size }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### رابط التحميل المباشر (عام لأي مستخدم)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "https://github.com/alawiteliberationinitiative-coder/ali-digital-gateway/releases/latest/download/ALI-Gateway.apk" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> أي تحديث على Replit يصل للمستخدمين فوراً بدون إعادة تثبيت الـ APK" >> $GITHUB_STEP_SUMMARY
