kind = "web"
previewPath = "/api/"
title = "API Server"
version = "1.0.0"
id = "artifacts/api-server"
router = "path"
deploymentTarget = "autoscale"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "API Server"
paths = ["/api/"]
localPort = 22729

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
run = "sh start.sh"

[services.env]
PORT = "22729"
BASE_PATH = "/api/"
