kind = "web"
previewPath = "/"
title = "ALI Initiative — Progress Tracker"
version = "1.0.0"
id = "artifacts/ali-progress"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23813

[services.development]
run = "pnpm --filter @workspace/ali-progress run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ali-progress", "run", "build" ]
publicDir = "artifacts/ali-progress/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23813"
BASE_PATH = "/"
