<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>بوابة A.L.I الرقمية</title>
    <meta name="description" content="بوابة مبادرة التحرير العلوي — تطبيق تيليغرام المصغر للهوية الرقمية السيادية." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="بوابة A.L.I الرقمية" />
    <meta property="og:description" content="بوابة مبادرة التحرير العلوي — تطبيق تيليغرام المصغر للهوية الرقمية السيادية." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="بوابة A.L.I الرقمية" />
    <meta name="twitter:description" content="بوابة مبادرة التحرير العلوي — تطبيق تيليغرام المصغر للهوية الرقمية السيادية." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- PWA manifest — يُمكّن "إضافة للشاشة الرئيسية" على iOS و Android -->
    <link rel="manifest" href="manifest.json" />
    <!-- iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="A.L.I" />
    <link rel="apple-touch-icon" href="favicon.svg" />
    <!-- Android PWA color -->
    <meta name="theme-color" content="#d4af37" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- DNS prefetch — resolves hostnames in parallel before requests are made -->
    <link rel="dns-prefetch" href="//api.telegram.org" />
    <link rel="dns-prefetch" href="//telegram.org" />
    <link rel="dns-prefetch" href="//sad.adsgram.ai" />
    <link rel="dns-prefetch" href="//libtl.com" />
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.gstatic.com" />

    <!-- Preconnect — opens TCP+TLS to critical origins early (saves ~200-400ms) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://telegram.org" />

    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;600;700;900&family=Cinzel:wght@400;600;700&family=Reem+Kufi:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Telegram Mini App SDK — synchronous so window.Telegram.WebApp is ready before React mounts -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Inline early background so user never sees a white flash before React paints -->
    <style>
      html, body, #root {
        margin: 0; padding: 0;
        background: #001a10;
        min-height: 100dvh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Main app bundle -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Ad SDKs loaded async/defer at end-of-body — must NOT block React startup -->
    <script async src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script defer src="//libtl.com/sdk.js" data-zone="11001376" data-sdk="show_11001376"></script>
  </body>
</html>
