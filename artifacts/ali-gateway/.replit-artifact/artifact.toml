kind = "web"
previewPath = "/"
title = "ALI Digital Gateway"
version = "1.0.0"
id = "artifacts/ali-gateway"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19823

[services.development]
run = "pnpm --filter @workspace/ali-gateway run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ali-gateway", "run", "build" ]
publicDir = "artifacts/ali-gateway/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19823"
BASE_PATH = "/"
