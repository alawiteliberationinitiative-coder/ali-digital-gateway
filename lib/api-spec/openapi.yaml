openapi: "3.1.0"
info:
  title: Api
  version: "1.0.0"
servers:
  - url: /api

components:
  securitySchemes:
    TelegramInitData:
      type: apiKey
      in: header
      name: x-telegram-init-data
      description: >
        HMAC-SHA256-signed Telegram Mini App initData string. The server
        validates the signature and freshness (≤ 1 hour) and derives the
        caller's identity from the embedded user object. Requests without a
        valid payload are treated as unauthenticated; protected endpoints
        return 401.

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string

    User:
      type: object
      required:
        [
          id,
          aliId,
          pseudonym,
          telegramId,
          vaultKey,
          identityKey,
          masterKey,
          mddBalance,
          rank,
          level,
          keysConfirmed,
          loyaltyPoints,
          createdAt,
        ]
      properties:
        id:
          type: integer
        aliId:
          type: string
          description: "Format: ALI-2026-XXXX"
        pseudonym:
          type: string
        telegramId:
          type: string
        telegramUsername:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        vaultKey:
          type: string
          description: Vault recovery key (shown once)
        identityKey:
          type: string
          description: Identity recovery key (shown once)
        masterKey:
          type: string
          description: Master recovery key (shown once)
        mddBalance:
          type: number
        rank:
          type: string
        level:
          type: integer
        keysConfirmed:
          type: boolean
        loyaltyPoints:
          type: integer
          description: Accumulated loyalty points from activities and rewarded ads
        createdAt:
          type: string
          format: date-time

    RegisterInput:
      type: object
      properties:
        telegramUsername:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]

    UpdatePseudonymInput:
      type: object
      required: [pseudonym]
      properties:
        pseudonym:
          type: string
          minLength: 3
          maxLength: 30

    AdRewardResult:
      type: object
      required: [loyaltyPoints, pointsAwarded]
      properties:
        loyaltyPoints:
          type: integer
          description: New total loyalty points balance
        pointsAwarded:
          type: integer
          description: Points awarded for this ad view

    TreasuryBalance:
      type: object
      required: [address, balanceTon, balanceUsd]
      properties:
        address:
          type: string
          description: Public TON wallet address
        balanceTon:
          type: number
          description: Balance in TON
        balanceUsd:
          type: number
          description: Estimated USD value
        lastUpdated:
          type: string
          format: date-time

paths:
  /healthz:
    get:
      operationId: healthCheck
      summary: Health check
      tags: [health]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/register:
    post:
      operationId: registerUser
      summary: Register or retrieve the authenticated user
      description: >
        Identity is derived from the verified x-telegram-init-data header.
        Returns the existing user record if the account already exists, or
        creates a new one with generated keys and initial balance.
      tags: [users]
      security:
        - TelegramInitData: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "200":
          description: Existing user returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "201":
          description: New user created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Missing or invalid Telegram initData
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /users/me:
    get:
      operationId: getMe
      summary: Get the authenticated user's profile
      tags: [users]
      security:
        - TelegramInitData: []
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Missing or invalid Telegram initData
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /users/me/pseudonym:
    patch:
      operationId: updatePseudonym
      summary: Update the authenticated user's pseudonym
      tags: [users]
      security:
        - TelegramInitData: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePseudonymInput"
      responses:
        "200":
          description: Pseudonym updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid pseudonym or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing or invalid Telegram initData
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Pseudonym already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /users/confirm-keys:
    post:
      operationId: confirmKeys
      summary: Mark the authenticated user's Triple Key Vault as confirmed
      tags: [users]
      security:
        - TelegramInitData: []
      responses:
        "200":
          description: Confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Missing or invalid Telegram initData
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /ads/reward:
    post:
      operationId: rewardAd
      summary: Award loyalty points after watching a rewarded ad
      tags: [ads]
      security:
        - TelegramInitData: []
      responses:
        "200":
          description: Points awarded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdRewardResult"
        "401":
          description: Missing or invalid Telegram initData
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /treasury/balance:
    get:
      operationId: getTreasuryBalance
      summary: Get TON treasury wallet public balance
      tags: [treasury]
      responses:
        "200":
          description: Treasury balance info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreasuryBalance"
